<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maribo Mania Festival Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Shrikhand&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-pink: #ff66b2;
            --color-blue: #3366ff;
            --color-purple: #9966ff;
            --color-yellow: #ffcc00;
            --color-orange: #ff9933;
            --color-bg: #1a0b2e;
            --color-grass: #2e8b57;
            --color-house: #3d235e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-bg);
            background-image: radial-gradient(circle at center, #2b134d 0%, #1a0b2e 100%);
            font-family: 'Fredoka', sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        header {
            padding: 20px;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Shrikhand', cursive;
            font-size: 3rem;
            color: var(--color-pink);
            text-shadow: 3px 3px 0 var(--color-blue), -2px -2px 0 var(--color-purple);
            letter-spacing: 2px;
            margin: 10px 0;
            animation: float 3s ease-in-out infinite;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--color-yellow);
            font-weight: 600;
            margin-top: 0;
        }

        /* Kortets base (Græsplænen) */
        .map-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: 600px;
            margin: 0 auto 40px auto;
            background-color: var(--color-grass);
            border: 5px solid var(--color-pink);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(153, 102, 255, 0.4);
            overflow: hidden;
        }

        /* CSS Tegning af huset (Fugleperspektiv) */
        .house-part-main {
            position: absolute;
            top: 25%;
            left: 45%;
            width: 35%;
            height: 15%;
            background-color: var(--color-house);
            transform: translate(-50%, -50%) rotate(15deg);
            border: 3px solid var(--color-orange);
            border-radius: 5px;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.3);
        }

        .house-part-left {
            position: absolute;
            top: 40%;
            left: 28%;
            width: 15%;
            height: 25%;
            background-color: var(--color-house);
            transform: translate(-50%, -50%) rotate(-30deg);
            border: 3px solid var(--color-orange);
            border-radius: 5px;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.3);
        }

        .house-part-right {
            position: absolute;
            top: 42%;
            left: 65%;
            width: 15%;
            height: 25%;
            background-color: var(--color-house);
            transform: translate(-50%, -50%) rotate(40deg);
            border: 3px solid var(--color-orange);
            border-radius: 5px;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.3);
        }

        /* Poolen med animation */
        .pool {
            position: absolute;
            top: 65%;
            left: 15%;
            width: 12%;
            height: 22%;
            background-color: #00e5ff;
            border: 5px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 5px 5px 0 rgba(0,0,0,0.3);
            animation: waterRipple 4s infinite alternate ease-in-out;
        }

        /* Det interaktive ikon (Markers) */
        .marker {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: var(--color-yellow);
            border: 3px solid var(--color-blue);
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background-color: var(--color-pink);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .marker:hover {
            transform: translate(-50%, -50%) scale(1.3);
            background-color: var(--color-orange);
        }

        /* Placering af ikoner baseret på din skitse */
        #pin-entrance { top: 18%; left: 28%; }
        #pin-food { top: 25%; left: 45%; }
        #pin-wc-left { top: 38%; left: 38%; }
        #pin-afterdark { top: 52%; left: 35%; }
        #pin-wc-right { top: 48%; left: 55%; }
        #pin-camp-north { top: 60%; left: 48%; }
        #pin-camp-west { top: 68%; left: 28%; }
        #pin-camp-south { top: 78%; left: 45%; }

        /* Modal / Pop-up boks */
        #location-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            border: 4px solid var(--color-blue);
            z-index: 100;
            box-shadow: 10px 10px 0 var(--color-pink);
            min-width: 250px;
            color: var(--color-bg);
        }

        #modal-title {
            font-family: 'Shrikhand', cursive;
            color: var(--color-purple);
            font-size: 2rem;
            margin: 0 0 10px 0;
        }

        .close-btn {
            background-color: var(--color-yellow);
            color: #333;
            border: 2px solid #333;
            padding: 10px 20px;
            font-family: 'Fredoka', sans-serif;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1rem;
        }

        .close-btn:hover {
            background-color: var(--color-pink);
            color: white;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 50;
        }

        /* Animationer */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes waterRipple {
            0% { background-color: #00e5ff; box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 5px 5px 0 rgba(0,0,0,0.3); }
            100% { background-color: #33ccff; box-shadow: inset 0 0 30px rgba(255,255,255,0.5), 5px 5px 0 rgba(0,0,0,0.3); }
        }
    </style>
</head>
<body>

    <header>
        <h1>MARIBO MANIA</h1>
        <p class="subtitle">FESTIVAL GROUNDS</p>
    </header>

    <div class="map-container">
        <div class="pool"></div>
        <div class="house-part-main"></div>
        <div class="house-part-left"></div>
        <div class="house-part-right"></div>

        <div class="marker" id="pin-entrance" data-title="Parking & Entrance NW"></div>
        <div class="marker" id="pin-food" data-title="Food Hall"></div>
        <div class="marker" id="pin-wc-left" data-title="Restrooms"></div>
        <div class="marker" id="pin-afterdark" data-title="After Dark Party"></div>
        <div class="marker" id="pin-wc-right" data-title="Restrooms"></div>
        <div class="marker" id="pin-camp-north" data-title="North Camp"></div>
        <div class="marker" id="pin-camp-west" data-title="West Camp"></div>
        <div class="marker" id="pin-camp-south" data-title="South Camp"></div>
    </div>

    <div id="overlay"></div>
    <div id="location-modal">
        <h2 id="modal-title">Location Name</h2>
        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>

    <script>
        const markers = document.querySelectorAll('.marker');
        const modal = document.getElementById('location-modal');
        const overlay = document.getElementById('overlay');
        const modalTitle = document.getElementById('modal-title');

        markers.forEach(marker => {
            marker.addEventListener('click', () => {
                const title = marker.getAttribute('data-title');
                modalTitle.textContent = title;
                modal.style.display = 'block';
                overlay.style.display = 'block';
            });
        });

        function closeModal() {
            modal.style.display = 'none';
            overlay.style.display = 'none';
        }

        overlay.addEventListener('click', closeModal);
    </script>
</body>
</html>
